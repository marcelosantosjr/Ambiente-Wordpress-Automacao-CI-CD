name: Deploy Nova Empresa (Multi-Tenant)

on:
  workflow_dispatch:
    inputs:
      company_id:
        description: 'ID da Empresa (Ex: empresac - minúsculo, sem espaços)'
        required: true
        type: string
      domain_name:
        description: 'Domínio Completo (Ex: cliente.servicoweb.shop)'
        required: true
        type: string
      db_password:
        description: 'Senha do Banco de Dados'
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Executar Automação na EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            
            # 1. Definir Variáveis baseadas no Input do GitHub
            BASE_DIR="$HOME/wordpress-multi"
            COMPANY_DIR="$BASE_DIR/${{ github.event.inputs.company_id }}"
            DOMAIN="${{ github.event.inputs.domain_name }}"
            
            echo "Iniciando provisionamento para: $DOMAIN"
            
            # 2. Criar a pasta isolada da nova empresa
            mkdir -p $COMPANY_DIR
            
            # 3. Criar o arquivo .env específico da empresa
            cat << EOF > $COMPANY_DIR/.env
            DB_ROOT_PASSWORD=RootSecret${{ github.event.inputs.company_id }}2026
            DB_NAME=wp_${{ github.event.inputs.company_id }}
            DB_USER=user_${{ github.event.inputs.company_id }}
            DB_PASSWORD=${{ github.event.inputs.db_password }}
            EOF
            
            # 4. Criar o compose-app.yml customizado para esta empresa
            cat << EOF > $COMPANY_DIR/compose-app.yml
            services:
              db-${{ github.event.inputs.company_id }}:
                image: mariadb:10.11
                container_name: db_${{ github.event.inputs.company_id }}
                restart: always
                environment:
                  MYSQL_ROOT_PASSWORD: RootSecret${{ github.event.inputs.company_id }}2026
                  MYSQL_DATABASE: wp_${{ github.event.inputs.company_id }}
                  MYSQL_USER: user_${{ github.event.inputs.company_id }}
                  MYSQL_PASSWORD: ${{ github.event.inputs.db_password }}
                volumes:
                  - db_data_${{ github.event.inputs.company_id }}:/var/lib/mysql
                networks:
                  - web_proxy_network

              wp-${{ github.event.inputs.company_id }}:
                depends_on:
                  - db-${{ github.event.inputs.company_id }}
                image: wordpress:6.4-php8.1-fpm-alpine
                container_name: wp_${{ github.event.inputs.company_id }}
                restart: always
                environment:
                  WORDPRESS_DB_HOST: db-${{ github.event.inputs.company_id }}:3306
                  WORDPRESS_DB_USER: user_${{ github.event.inputs.company_id }}
                  WORDPRESS_DB_PASSWORD: ${{ github.event.inputs.db_password }}
                  WORDPRESS_DB_NAME: wp_${{ github.event.inputs.company_id }}
                volumes:
                  - wp_data_${{ github.event.inputs.company_id }}:/var/www/html
                networks:
                  - web_proxy_network

            volumes:
              db_data_${{ github.event.inputs.company_id }}:
              wp_data_${{ github.event.inputs.company_id }}:

            networks:
              web_proxy_network:
                external: true
            EOF
            
            # 5. Adicionar a configuração de roteamento no Nginx Central (Apenas bloco HTTP inicial)
            # Verifica se o domínio já não está mapeado para evitar duplicidade
            if ! grep -q "$DOMAIN" $BASE_DIR/proxy-nginx/default.conf; then
              cat << EOF >> $BASE_DIR/proxy-nginx/default.conf

            # Bloco Automático: $DOMAIN
            server {
                listen 80;
                server_name $DOMAIN;
                location /.well-known/acme-challenge/ { root /var/www/html; }
                location / { try_files \$uri \$uri/ /index.php?\$args; }
            }
            EOF
            fi
            
            # 6. Recarregar o Nginx Central para reconhecer o novo domínio na porta 80
            cd $BASE_DIR
            docker compose -f compose-proxy.yml restart nginx-proxy
            
            # 7. Subir a aplicação da nova empresa
            cd $COMPANY_DIR
            docker compose -f compose-app.yml up -d
            
            # 8. Emitir o Certificado SSL via Certbot Central
            echo "Solicitando certificado SSL para $DOMAIN..."
            docker compose -f $BASE_DIR/compose-proxy.yml run --rm --entrypoint "certbot certonly --webroot --webroot-path=/var/www/html --email marcelojrtech@gmail.com --agree-tos --no-eff-email -d $DOMAIN" certbot
            
            # 9. Atualizar o bloco do Nginx para ativar o HTTPS (Substituindo o bloco temporário)
            sed -i "/# Bloco Automático: $DOMAIN/,+6d" $BASE_DIR/proxy-nginx/default.conf
            
            cat << EOF >> $BASE_DIR/proxy-nginx/default.conf

            # Bloco Automático: $DOMAIN
            server {
                listen 80;
                server_name $DOMAIN;
                
                # CRÍTICO: Raiz global unificada estritamente para renovações do Certbot
                root /var/www/html;
                
                location /.well-known/acme-challenge/ {
                    default_type "text/plain";
                    try_files \$uri =404;
                }
                
                location / { 
                    return 301 https://\$host\$request_uri; 
                }
            }
            
            server {
                listen 443 ssl;
                server_name $DOMAIN;
                ssl_certificate /etc/letsencrypt/live/$DOMAIN/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/$DOMAIN/privkey.pem;
                
                ssl_protocols TLSv1.2 TLSv1.3;
                ssl_prefer_server_ciphers on;
                ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
                
                root /var/www/html/${{ github.event.inputs.company_id }};
                index index.php;
                
                location / {
                    try_files \$uri \$uri/ /index.php?\$args;
                }
                
                location ~ \.php$ {
                    include fastcgi_params;
                    fastcgi_split_path_info ^(.+\.php)(/.+)$;
                    fastcgi_pass wp-${{ github.event.inputs.company_id }}:9000;
                    fastcgi_index index.php;
                    fastcgi_param SCRIPT_FILENAME /var/www/html/\$fastcgi_script_name;
                    fastcgi_param HTTPS on;
                    fastcgi_param HTTP_X_FORWARDED_PROTO https;
                }
            }
            EOF
            
            # 10. Reiniciar Nginx Proxy final
            cd $BASE_DIR
            docker compose -f compose-proxy.yml restart nginx-proxy
            echo "Deploy de $DOMAIN concluído com sucesso e SSL ativo!"