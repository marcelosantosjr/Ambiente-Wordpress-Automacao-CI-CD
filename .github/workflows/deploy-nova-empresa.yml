name: Deploy Nova Empresa (Multi-Tenant)

on:
  workflow_dispatch:
    inputs:
      company_id:
        description: 'ID único, minúsculo, apenas letras/números (Ex: jarvis)'
        required: true
        type: string
      domain_name:
        description: 'Domínio completo (Ex: loja.seudominio.com.br)'
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Executar automação na EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail

            BASE_DIR="$HOME/wordpress-multi"
            COMPANY_ID="${{ github.event.inputs.company_id }}"
            DOMAIN="${{ github.event.inputs.domain_name }}"
            CONF_FILE="$BASE_DIR/proxy-nginx/conf.d/$COMPANY_ID.conf"

            # ---------------------------------------------------------
            # 0. Validação estrita de entrada (evita injeção/path traversal)
            # ---------------------------------------------------------
            if ! [[ "$COMPANY_ID" =~ ^[a-z0-9]{2,20}$ ]]; then
              echo "ERRO: company_id inválido. Use apenas letras minúsculas e números (2-20 caracteres)."
              exit 1
            fi

            if ! [[ "$DOMAIN" =~ ^[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}$ ]]; then
              echo "ERRO: domain_name inválido."
              exit 1
            fi

            echo "Iniciando provisionamento isolado para: $DOMAIN"

            mkdir -p "$BASE_DIR/$COMPANY_ID/wp-data"
            mkdir -p "$BASE_DIR/proxy-nginx/conf.d"

            # ---------------------------------------------------------
            # 1. Gerar senhas aleatórias no servidor (idempotente: se já
            #    existir .env deste tenant, reaproveita as credenciais)
            # ---------------------------------------------------------
            if [ -f "$BASE_DIR/$COMPANY_ID/.env" ]; then
              echo "AVISO: .env já existe para $COMPANY_ID, reutilizando credenciais."
            else
              DB_ROOT_PASSWORD=$(openssl rand -base64 24 | tr -dc 'a-zA-Z0-9')
              DB_PASSWORD=$(openssl rand -base64 24 | tr -dc 'a-zA-Z0-9')

              cat << EOF > "$BASE_DIR/$COMPANY_ID/.env"
            DB_ROOT_PASSWORD=$DB_ROOT_PASSWORD
            DB_NAME=wp_${COMPANY_ID}
            DB_USER=user_${COMPANY_ID}
            DB_PASSWORD=$DB_PASSWORD
            EOF
              chmod 600 "$BASE_DIR/$COMPANY_ID/.env"
            fi

            # ---------------------------------------------------------
            # 2. compose-app.yml exclusivo do cliente
            #    - wp-data: bind mount local (visível pelo nginx-proxy
            #      via ./:/var/www/html/sites:ro do compose-proxy.yml)
            #    - db-data: volume nomeado INTERNO (não é external, não
            #      precisa ser compartilhado com outro compose file)
            # ---------------------------------------------------------
            cat << 'EOF' > "$BASE_DIR/$COMPANY_ID/compose-app.yml.tmp"
            services:
              db-__COMPANY_ID__:
                image: mariadb:10.11
                container_name: db___COMPANY_ID__
                restart: always
                env_file: .env
                environment:
                  MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
                  MYSQL_DATABASE: ${DB_NAME}
                  MYSQL_USER: ${DB_USER}
                  MYSQL_PASSWORD: ${DB_PASSWORD}
                volumes:
                  - db_data___COMPANY_ID__:/var/lib/mysql
                networks:
                  - web_proxy_network

              wp-__COMPANY_ID__:
                depends_on:
                  - db-__COMPANY_ID__
                image: wordpress:6.4-php8.1-fpm-alpine
                container_name: wp___COMPANY_ID__
                restart: always
                env_file: .env
                environment:
                  WORDPRESS_DB_HOST: db-__COMPANY_ID__:3306
                  WORDPRESS_DB_USER: ${DB_USER}
                  WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
                  WORDPRESS_DB_NAME: ${DB_NAME}
                volumes:
                  - ./wp-data:/var/www/html
                networks:
                  - web_proxy_network

            volumes:
              db_data___COMPANY_ID__:

            networks:
              web_proxy_network:
                external: true
            EOF
            sed "s/__COMPANY_ID__/${COMPANY_ID}/g" \
              "$BASE_DIR/$COMPANY_ID/compose-app.yml.tmp" > "$BASE_DIR/$COMPANY_ID/compose-app.yml"
            rm -f "$BASE_DIR/$COMPANY_ID/compose-app.yml.tmp"

            # ---------------------------------------------------------
            # 3. Bloco HTTP temporário (validação Certbot)
            # ---------------------------------------------------------
            cat << EOF > "$CONF_FILE"
            server {
                listen 80;
                server_name $DOMAIN;
                root /var/www/html;
                location /.well-known/acme-challenge/ { default_type "text/plain"; try_files \$uri =404; }
                location / { return 404; }
            }
            EOF

            # ---------------------------------------------------------
            # 4. Recarregar Nginx (reload; só recria se o reload falhar)
            # ---------------------------------------------------------
            cd "$BASE_DIR"
            docker compose -f compose-proxy.yml exec -T nginx-proxy nginx -s reload \
              || docker compose -f compose-proxy.yml up -d --force-recreate nginx-proxy

            # ---------------------------------------------------------
            # 5. Subir WordPress + banco do cliente
            # ---------------------------------------------------------
            cd "$BASE_DIR/$COMPANY_ID"
            docker compose -f compose-app.yml up -d

            # ---------------------------------------------------------
            # 6. Certificado SSL — "--entrypoint certbot" sobrescreve o
            #    loop de renovação (que travaria a pipeline para sempre)
            # ---------------------------------------------------------
            echo "Solicitando certificado SSL para $DOMAIN..."
            cd "$BASE_DIR"
            docker compose -f compose-proxy.yml run --rm --entrypoint certbot certbot \
              certonly --webroot --webroot-path=/var/www/html \
              --email marcelojrtech@gmail.com --agree-tos --no-eff-email \
              --non-interactive -d "$DOMAIN"

            # ---------------------------------------------------------
            # 7. Bloco Nginx definitivo (HTTP->HTTPS + HTTPS com PHP-FPM)
            # ---------------------------------------------------------
            cat << EOF > "$CONF_FILE"
            server {
                listen 80;
                server_name $DOMAIN;
                root /var/www/html;
                location /.well-known/acme-challenge/ { default_type "text/plain"; try_files \$uri =404; }
                location / { return 301 https://\$host\$request_uri; }
            }

            server {
                listen 443 ssl;
                server_name $DOMAIN;
                ssl_certificate /etc/letsencrypt/live/$DOMAIN/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/$DOMAIN/privkey.pem;

                ssl_protocols TLSv1.2 TLSv1.3;
                ssl_prefer_server_ciphers on;
                ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';

                # Path do bind mount visto PELO NGINX (via ./:/var/www/html/sites:ro)
                root /var/www/html/sites/$COMPANY_ID/wp-data;
                index index.php;

                location / {
                    try_files \$uri \$uri/ /index.php?\$args;
                }

                location ~ \.php\$ {
                    include fastcgi_params;
                    fastcgi_split_path_info ^(.+\.php)(/.+)\$;
                    fastcgi_pass wp-$COMPANY_ID:9000;
                    fastcgi_index index.php;
                    # Path visto DENTRO DO CONTAINER wp-<tenant> (raiz é /var/www/html)
                    fastcgi_param SCRIPT_FILENAME /var/www/html\$fastcgi_script_name;
                    fastcgi_param HTTPS on;
                    fastcgi_param HTTP_X_FORWARDED_PROTO https;
                }
            }
            EOF

            # ---------------------------------------------------------
            # 8. Reload final (sem "down", outros tenants não caem)
            # ---------------------------------------------------------
            cd "$BASE_DIR"
            docker compose -f compose-proxy.yml exec -T nginx-proxy nginx -s reload \
              || docker compose -f compose-proxy.yml up -d --force-recreate nginx-proxy

            echo "Deploy de $DOMAIN concluído com sucesso!"
            echo "Credenciais salvas em $BASE_DIR/$COMPANY_ID/.env (permissão 600)."