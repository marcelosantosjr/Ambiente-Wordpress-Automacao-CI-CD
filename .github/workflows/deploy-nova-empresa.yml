name: Deploy Nova Empresa (Multi-Tenant)

on:
  workflow_dispatch:
    inputs:
      company_id:
        description: 'ID Único da Empresa (Ex: celocompany - minúsculo, sem espaços)'
        required: true
        type: string
      domain_name:
        description: 'Domínio Completo (Ex: celocompany.servicoweb.shop)'
        required: true
        type: string
      db_password:
        description: 'Senha do Banco de Dados'
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Executar Automação na EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            
            BASE_DIR="$HOME/wordpress-multi"
            COMPANY_ID="${{ github.event.inputs.company_id }}"
            DOMAIN="${{ github.event.inputs.domain_name }}"
            CONF_FILE="$BASE_DIR/proxy-nginx/conf.d/$COMPANY_ID.conf"
            
            echo "Iniciando provisionamento isolado para: $DOMAIN"
            
            mkdir -p $BASE_DIR/$COMPANY_ID
            mkdir -p $BASE_DIR/proxy-nginx/conf.d
            mkdir -p $BASE_DIR/proxy-nginx/certbot-html
            
            # 1. Gerar arquivo .env da aplicação
            cat << EOF > $BASE_DIR/$COMPANY_ID/.env
            DB_ROOT_PASSWORD=RootSecret${COMPANY_ID}2026
            DB_NAME=wp_${COMPANY_ID}
            DB_USER=user_${COMPANY_ID}
            DB_PASSWORD=${{ github.event.inputs.db_password }}
            EOF
            
            # 2. Gerar compose-app.yml exclusivo do cliente
            cat << EOF > $BASE_DIR/$COMPANY_ID/compose-app.yml
            services:
              db-$COMPANY_ID:
                image: mariadb:10.11
                container_name: db_$COMPANY_ID
                restart: always
                environment:
                  MYSQL_ROOT_PASSWORD: RootSecret${COMPANY_ID}2026
                  MYSQL_DATABASE: wp_${COMPANY_ID}
                  MYSQL_USER: user_${COMPANY_ID}
                  MYSQL_PASSWORD: ${{ github.event.inputs.db_password }}
                volumes:
                  - db_data_${COMPANY_ID}:/var/lib/mysql
                networks:
                  - web_proxy_network

              wp-$COMPANY_ID:
                depends_on:
                  - db-$COMPANY_ID
                image: wordpress:6.4-php8.1-fpm-alpine
                container_name: wp_$COMPANY_ID
                restart: always
                environment:
                  WORDPRESS_DB_HOST: db-$COMPANY_ID:3306
                  WORDPRESS_DB_USER: user_${COMPANY_ID}
                  WORDPRESS_DB_PASSWORD: ${{ github.event.inputs.db_password }}
                  WORDPRESS_DB_NAME: wp_${COMPANY_ID}
                volumes:
                  - wp_data_${COMPANY_ID}:/var/www/html
                networks:
                  - web_proxy_network

            volumes:
              db_data_${COMPANY_ID}:
              wp_data_${COMPANY_ID}:

            networks:
              web_proxy_network:
                external: true
            EOF
            
            # 3. Criar arquivo de rota temporário na Porta 80 para validação do Certbot
            cat << EOF > $CONF_FILE
            server {
                listen 80;
                server_name $DOMAIN;
                root /var/www/html;
                location /.well-known/acme-challenge/ { default_type "text/plain"; try_files \$uri =404; }
                location / { return 404; }
            }
            EOF
            
            # 4. Recarregar Nginx para expor a rota temporária da porta 80 e aguardar estabilização
            cd $BASE_DIR
            docker compose -f compose-proxy.yml restart nginx-proxy
            echo "Aguardando 5 segundos para o Nginx estabilizar na porta 80..."
            sleep 5
            
            # 5. Subir a aplicação (WordPress + Banco) do cliente
            cd $BASE_DIR/$COMPANY_ID
            docker compose -f compose-app.yml up -d
            
            # 6. Solicitar Certificado SSL de forma automatizada (Não-interativa)
            echo "Solicitando certificado SSL via Certbot para $DOMAIN..."
            docker compose -f $BASE_DIR/compose-proxy.yml run --rm --entrypoint "certbot certonly --webroot --webroot-path=/var/www/html --email marcelojrtech@gmail.com --agree-tos --no-eff-email --non-interactive -d $DOMAIN" certbot
            
            # 7. Injetar dinamicamente o volume estático no Nginx Mestre para corrigir o carregamento do CSS
            if ! grep -q "${COMPANY_ID}_wp_data_${COMPANY_ID}" $BASE_DIR/compose-proxy.yml; then
                # Injeta com segurança o mapeamento de volume dentro do bloco do container nginx-proxy
                sed -i "/.\/proxy-nginx\/certbot-html:\/var\/www\/html/a \      - ${COMPANY_ID}_wp_data_${COMPANY_ID}:/var/www/html/${COMPANY_ID}" $BASE_DIR/compose-proxy.yml
                
                # Anexa com segurança a declaração de volume externo no final do arquivo, evitando quebrar o YAML
                cat << EXTRA_VOLUMES >> $BASE_DIR/compose-proxy.yml
                ${COMPANY_ID}_wp_data_${COMPANY_ID}:
                external: true
                EXTRA_VOLUMES
            fi
            
            # 8. Sobrescrever com o Bloco Nginx Definitivo com HTTPS ativo e suporte a CSS/Admin
            cat << EOF > $CONF_FILE
            server {
                listen 80;
                server_name $DOMAIN;
                root /var/www/html;
                location /.well-known/acme-challenge/ { default_type "text/plain"; try_files \$uri =404; }
                location / { return 301 https://\$host\$request_uri; }
            }

            server {
                listen 443 ssl;
                server_name $DOMAIN;
                ssl_certificate /etc/letsencrypt/live/$DOMAIN/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/$DOMAIN/privkey.pem;
                
                ssl_protocols TLSv1.2 TLSv1.3;
                ssl_prefer_server_ciphers on;
                ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
                
                root /var/www/html/$COMPANY_ID;
                index index.php;
                
                location / {
                    try_files \$uri \$uri/ /index.php?\$args;
                }
                
                location ~ \.php$ {
                    include fastcgi_params;
                    fastcgi_split_path_info ^(.+\.php)(/.+)$;
                    fastcgi_pass wp-$COMPANY_ID:9000;
                    fastcgi_index index.php;
                    fastcgi_param SCRIPT_FILENAME /var/www/html/\$fastcgi_script_name;
                    fastcgi_param HTTPS on;
                    fastcgi_param HTTP_X_FORWARDED_PROTO https;
                }
            }
            EOF
            
            # 9. Reinicialização completa para o Nginx assumir o novo volume e rotas SSL
            cd $BASE_DIR
            docker compose -f compose-proxy.yml down
            docker compose -f compose-proxy.yml up -d
            
            echo "Deploy de $DOMAIN concluído com sucesso total!"