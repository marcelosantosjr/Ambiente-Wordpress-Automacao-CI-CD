name: Deploy New WordPress Tenant

on:
  workflow_dispatch:
    inputs:
      tenant_id:
        description: 'ID unico da empresa (ex: empresac)'
        required: true
        type: string
      domain_name:
        description: 'Dominio do cliente (ex: empresac.com)'
        required: true
        type: string
      wp_title:
        description: 'Titulo do WordPress'
        required: true
        default: 'Meu WordPress'
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Secure Credentials
        id: creds
        run: |
          echo "db_password=$(openssl rand -hex 16)" >> $GITHUB_OUTPUT
          echo "wp_password=$(openssl rand -hex 16)" >> $GITHUB_OUTPUT

      - name: Execute Remote Deployment via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GITHUB_OUTPUT
          script: |
            set -e
            
            TENANT_ID="${{ inputs.tenant_id }}"
            DOMAIN="${{ inputs.domain_name }}"
            DB_PASSWORD="${{ steps.creds.outputs.db_password }}"
            WP_PASSWORD="${{ steps.creds.outputs.wp_password }}"
            
            TENANT_DIR="/infra/tenants/$TENANT_ID"
            NGINX_CONF_DIR="/infra/nginx-central/conf.d"
            
            # 1. Garantir diretorios
            mkdir -p "$TENANT_DIR"
            mkdir -p "$NGINX_CONF_DIR"
            
            # 2. Criar arquivo .env isolado
            cat << EOF > "$TENANT_DIR/.env"
            TENANT_ID=$TENANT_ID
            DOMAIN=$DOMAIN
            MYSQL_ROOT_PASSWORD=$(openssl rand -hex 16)
            MYSQL_PASSWORD=$DB_PASSWORD
            WORDPRESS_DB_PASSWORD=$DB_PASSWORD
            EOF
            
            # 3. Criar docker-compose.yml do Tenant
            cat << 'EOF' > "$TENANT_DIR/docker-compose.yml"
            version: '3.8'
            services:
              db:
                image: mysql:8.0
                container_name: ${TENANT_ID}_db
                restart: always
                environment:
                  MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
                  MYSQL_DATABASE: wordpress
                  MYSQL_USER: wordpress
                  MYSQL_PASSWORD: ${MYSQL_PASSWORD}
                volumes:
                  - db_data:/var/lib/mysql
                networks:
                  - internal_net

              wordpress:
                image: wordpress:6.4-php8.2-fpm-alpine
                container_name: ${TENANT_ID}_wp
                restart: always
                depends_on:
                  - db
                environment:
                  WORDPRESS_DB_HOST: db:3306
                  WORDPRESS_DB_USER: wordpress
                  WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
                  WORDPRESS_DB_NAME: wordpress
                volumes:
                  - wp_data:/var/var/www/html
                networks:
                  - internal_net
                  - web_proxy_network

            volumes:
              db_data:
              wp_data:

            networks:
              internal_net:
              web_proxy_network:
                external: true
            EOF

            # 4. Criar configuracao Nginx Temporaria (HTTP para validacao do Certbot)
            cat << EOF > "$NGINX_CONF_DIR/$TENANT_ID.conf"
            server {
                listen 80;
                server_name $DOMAIN;

                location /.well-known/acme-challenge/ {
                    root /var/www/certbot;
                }

                location / {
                    return 301 https://\$host\$request_uri;
                }
            }
            EOF

            # 5. Recarregar Nginx Central para aplicar HTTP temporario e iniciar App do tenant
            docker exec nginx-proxy-central nginx -s reload
            cd "$TENANT_DIR" && docker compose up -d

            # 6. Executar Certbot no Host para emitir o certificado TLS
            # Nota: Certbot precisa estar instalado no host ou rodar via container temporario.
            # Assumindo uso do certbot-cli instalado no host de forma nativa para simplicidade de escopo:
            sudo certbot certonly --webroot -w /var/www/certbot -d "$DOMAIN" --email admin@$DOMAIN --agree-tos --non-interactive --keep-until-expiring

            # 7. Sobrescrever com a configuracao definitiva do Nginx (HTTPS + Proxy para FastCGI PHP-FPM)
            # Como o WP usa FPM, mapeamos o proxy reverso apontando para a porta do FPM (9000) via rede do Docker
            cat << EOF > "$NGINX_CONF_DIR/$TENANT_ID.conf"
            server {
                listen 80;
                server_name $DOMAIN;
                return 301 https://\$host\$request_uri;
            }

            server {
                listen 443 ssl;
                server_name $DOMAIN;

                ssl_certificate /etc/letsencrypt/live/$DOMAIN/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/$DOMAIN/privkey.pem;
                
                ssl_protocols TLSv1.2 TLSv1.3;
                ssl_ciphers HIGH:!aNULL:!MD5;

                root /var/www/html;
                index index.php;

                location / {
                    try_files \$uri \$uri/ /index.php?\$args;
                }

                location ~ \.php\$ {
                    include fastcgi_params;
                    fastcgi_intercept_errors on;
                    fastcgi_pass ${TENANT_ID}_wp:9000;
                    fastcgi_param SCRIPT_FILENAME \$document_root\$fastcgi_script_name;
                }
            }
            EOF

            # 8. Recarregar o Nginx Central com a configuracao HTTPS final
            docker exec nginx-proxy-central nginx -s reload