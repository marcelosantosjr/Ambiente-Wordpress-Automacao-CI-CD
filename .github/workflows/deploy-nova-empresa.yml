name: Deploy Nova Empresa (Multi-Tenant)

on:
  workflow_dispatch:
    inputs:
      company_id:
        description: 'ID unico, minusculo, apenas letras/numeros (Ex: jarvis)'
        required: true
        type: string
      domain_name:
        description: 'Dominio completo (Ex: jarvis.servicoweb.shop)'
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Executar automacao na EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail

            BASE_DIR="$HOME/wordpress-multi"
            COMPANY_ID="${{ github.event.inputs.company_id }}"
            DOMAIN="${{ github.event.inputs.domain_name }}"
            CONF_FILE="$BASE_DIR/proxy-nginx/conf.d/$COMPANY_ID.conf"

            # ---------------------------------------------------------
            # 0. Validacao estrita de entrada (evita injecao/path traversal)
            # ---------------------------------------------------------
            if ! [[ "$COMPANY_ID" =~ ^[a-z0-9]{2,20}$ ]]; then
              echo "ERRO: company_id invalido. Use apenas letras minusculas e numeros (2-20 caracteres)."
              exit 1
            fi

            if ! [[ "$DOMAIN" =~ ^[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}$ ]]; then
              echo "ERRO: domain_name invalido."
              exit 1
            fi

            if [ -d "$BASE_DIR/$COMPANY_ID" ]; then
              echo "AVISO: pasta $BASE_DIR/$COMPANY_ID ja existe. Prosseguindo (idempotente)."
            fi

            echo "Iniciando provisionamento isolado para: $DOMAIN"

            mkdir -p "$BASE_DIR/$COMPANY_ID/wp-data"
            mkdir -p "$BASE_DIR/proxy-nginx/conf.d"

            # ---------------------------------------------------------
            # 1. Gerar senhas aleatorias no servidor (nunca vem do GitHub)
            # ---------------------------------------------------------
            if [ -f "$BASE_DIR/$COMPANY_ID/.env" ]; then
              echo "AVISO: .env ja existe para $COMPANY_ID, reutilizando credenciais existentes."
            else
              DB_ROOT_PASSWORD=$(openssl rand -base64 24 | tr -dc 'a-zA-Z0-9')
              DB_PASSWORD=$(openssl rand -base64 24 | tr -dc 'a-zA-Z0-9')

              cat << EOF > "$BASE_DIR/$COMPANY_ID/.env"
            DB_ROOT_PASSWORD=$DB_ROOT_PASSWORD
            DB_NAME=wp_${COMPANY_ID}
            DB_USER=user_${COMPANY_ID}
            DB_PASSWORD=$DB_PASSWORD
            EOF
              chmod 600 "$BASE_DIR/$COMPANY_ID/.env"
            fi

            # ---------------------------------------------------------
            # 2. compose-app.yml exclusivo do cliente (le tudo do .env)
            #    Bind mount local (./wp-data) em vez de volume nomeado:
            #    elimina o bug de nomes de volume prefixados/indefinidos.
            # ---------------------------------------------------------
            cat << 'EOF' > "$BASE_DIR/$COMPANY_ID/compose-app.yml.tmp"
            services:
              db-__COMPANY_ID__:
                image: mariadb:10.11
                container_name: db___COMPANY_ID__
                restart: always
                env_file: .env
                environment:
                  MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
                  MYSQL_DATABASE: ${DB_NAME}
                  MYSQL_USER: ${DB_USER}
                  MYSQL_PASSWORD: ${DB_PASSWORD}
                volumes:
                  - db_data___COMPANY_ID__:/var/lib/mysql
                networks:
                  - web_proxy_network

              wp-__COMPANY_ID__:
                depends_on:
                  - db-__COMPANY_ID__
                image: wordpress:6.4-php8.1-fpm-alpine
                container_name: wp___COMPANY_ID__
                restart: always
                env_file: .env
                environment:
                  WORDPRESS_DB_HOST: db-__COMPANY_ID__:3306
                  WORDPRESS_DB_USER: ${DB_USER}
                  WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
                  WORDPRESS_DB_NAME: ${DB_NAME}
                volumes:
                  - ./wp-data:/var/www/html
                networks:
                  - web_proxy_network

            volumes:
              db_data___COMPANY_ID__:

            networks:
              web_proxy_network:
                external: true
            EOF
            # Substitui o placeholder pelo company_id real (ja validado por regex acima)
            sed "s/__COMPANY_ID__/${COMPANY_ID}/g" \
              "$BASE_DIR/$COMPANY_ID/compose-app.yml.tmp" > "$BASE_DIR/$COMPANY_ID/compose-app.yml"
            rm -f "$BASE_DIR/$COMPANY_ID/compose-app.yml.tmp"

            # ---------------------------------------------------------
            # 3. Bloco HTTP temporario (validacao Certbot)
            # ---------------------------------------------------------
            cat << EOF > "$CONF_FILE"
            server {
                listen 80;
                server_name $DOMAIN;
                root /var/www/html;
                location /.well-known/acme-challenge/ { default_type "text/plain"; try_files \$uri =404; }
                location / { return 404; }
            }
            EOF

            # ---------------------------------------------------------
            # 4. Recarregar Nginx (o bind mount global ja existe desde o
            #    setup inicial, entao um simples reload basta)
            # ---------------------------------------------------------
            cd "$BASE_DIR"
            docker compose -f compose-proxy.yml exec -T nginx-proxy nginx -s reload \
              || docker compose -f compose-proxy.yml up -d --force-recreate nginx-proxy

            # ---------------------------------------------------------
            # 5. Subir WordPress + banco do cliente
            # ---------------------------------------------------------
            cd "$BASE_DIR/$COMPANY_ID"
            docker compose -f compose-app.yml up -d

            # ---------------------------------------------------------
            # 6. Certificado SSL (sobrescreve o entrypoint do loop de
            #    renovacao para rodar o certonly e SAIR, sem travar)
            # ---------------------------------------------------------
            echo "Solicitando certificado SSL para $DOMAIN..."
            cd "$BASE_DIR"
            docker compose -f compose-proxy.yml run --rm --entrypoint certbot certbot \
              certonly --webroot --webroot-path=/var/www/html \
              --email marcelojrtech@gmail.com --agree-tos --no-eff-email \
              --non-interactive -d "$DOMAIN"

            # ---------------------------------------------------------
            # 7. [REMOVIDO] Nao ha mais edicao do compose-proxy.yml aqui.
            #    O bind mount "./:/var/www/html/sites:ro" definido uma
            #    unica vez no setup inicial ja enxerga a pasta deste
            #    tenant automaticamente. Zero risco de corromper o YAML.
            # ---------------------------------------------------------

            # ---------------------------------------------------------
            # 8. Bloco Nginx definitivo (HTTP->HTTPS + HTTPS com PHP-FPM)
            # ---------------------------------------------------------
            cat << EOF > "$CONF_FILE"
            server {
                listen 80;
                server_name $DOMAIN;
                root /var/www/html;
                location /.well-known/acme-challenge/ { default_type "text/plain"; try_files \$uri =404; }
                location / { return 301 https://\$host\$request_uri; }
            }

            server {
                listen 443 ssl;
                server_name $DOMAIN;
                ssl_certificate /etc/letsencrypt/live/$DOMAIN/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/$DOMAIN/privkey.pem;

                ssl_protocols TLSv1.2 TLSv1.3;
                ssl_prefer_server_ciphers on;
                ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';

                root /var/www/html/sites/$COMPANY_ID/wp-data;
                index index.php;

                location / {
                    try_files \$uri \$uri/ /index.php?\$args;
                }

                location ~ \.php\$ {
                    include fastcgi_params;
                    fastcgi_split_path_info ^(.+\.php)(/.+)\$;
                    fastcgi_pass wp-$COMPANY_ID:9000;
                    fastcgi_index index.php;
                    fastcgi_param SCRIPT_FILENAME /var/www/html\$fastcgi_script_name;
                    fastcgi_param HTTPS on;
                    fastcgi_param HTTP_X_FORWARDED_PROTO https;
                }
            }
            EOF

            # ---------------------------------------------------------
            # 9. Reload final do Nginx central para assumir o bloco HTTPS
            #    (nao usa "down", entao outros tenants nao caem)
            # ---------------------------------------------------------
            cd "$BASE_DIR"
            docker compose -f compose-proxy.yml exec -T nginx-proxy nginx -s reload \
              || docker compose -f compose-proxy.yml up -d --force-recreate nginx-proxy

            echo "Deploy de $DOMAIN concluido com sucesso!"
            echo "Credenciais salvas em $BASE_DIR/$COMPANY_ID/.env (permissao 600)."
